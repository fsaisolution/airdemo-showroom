name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Replace native modules for Linux
        run: |
          # Remove macOS native modules first
          rm -rf node_modules/@esbuild/darwin-arm64 2>/dev/null || true
          rm -rf node_modules/@rollup/rollup-darwin-arm64 2>/dev/null || true
          
          # Define packages to patch
          PACKAGES=("@esbuild/linux-x64" "@rollup/rollup-linux-x64-gnu")
          
          for PKG in "${PACKAGES[@]}"; do
            # Get version from local node_modules
            if [[ "$PKG" == *"esbuild"* ]]; then
              VERSION=$(node -p "require('./node_modules/esbuild/package.json').version")
              TARBALL_NAME="linux-x64-${VERSION}.tgz"
            else
              VERSION=$(node -p "require('./node_modules/rollup/package.json').version")
              TARBALL_NAME="rollup-linux-x64-gnu-${VERSION}.tgz"
            fi
            
            echo "Detected version: $VERSION, downloading $PKG..."
            
            # Clean and create target directory
            rm -rf "node_modules/$PKG"
            mkdir -p "node_modules/$PKG"
            
            # Download and extract from npm registry
            curl -sL "https://registry.npmjs.org/$PKG/-/$TARBALL_NAME" | tar -xz -C "node_modules/$PKG" --strip-components=1
            
            if [ ${PIPESTATUS[0]} -eq 0 ]; then
              echo "✅ $PKG@$VERSION installed successfully"
            else
              echo "❌ Failed to download $PKG"
              exit 1
            fi
          done
          
          # Ensure execute permissions
          chmod +x node_modules/@esbuild/linux-x64/bin/esbuild 2>/dev/null || true
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
