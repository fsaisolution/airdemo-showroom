name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Replace native modules for Linux
        run: |
          # Remove macOS native modules
          rm -rf node_modules/@esbuild/darwin-arm64
          rm -rf node_modules/@rollup/rollup-darwin-arm64
          rm -rf node_modules/@rollup/rollup-linux-x64-gnu 2>/dev/null || true
          
          # Download Linux native modules from npm registry
          mkdir -p node_modules/@esbuild
          mkdir -p node_modules/@rollup
          
          # esbuild for Linux
          curl -L -o esbuild.tgz https://registry.npmjs.org/@esbuild/linux-x64/-/linux-x64-0.25.0.tgz
          tar -xzf esbuild.tgz
          mv package node_modules/@esbuild/linux-x64
          rm -rf package esbuild.tgz
          
          # rollup for Linux
          curl -L -o rollup.tgz https://registry.npmjs.org/@rollup/rollup-linux-x64-gnu/-/rollup-linux-x64-gnu-4.34.9.tgz
          tar -xzf rollup.tgz
          mv package node_modules/@rollup/rollup-linux-x64-gnu
          rm -rf package rollup.tgz
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
