name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Replace native modules for Linux
        run: |
          # Remove macOS native modules first
          rm -rf node_modules/@esbuild/darwin-arm64 2>/dev/null || true
          rm -rf node_modules/@rollup/rollup-darwin-arm64 2>/dev/null || true
          
          # Define packages to patch
          PACKAGES=("@esbuild/linux-x64" "@rollup/rollup-linux-x64-gnu")
          
          for PKG in "${PACKAGES[@]}"; do
            # Extract base name (esbuild or rollup)
            BASE_NAME=$(echo $PKG | cut -d'/' -f2 | cut -d'-' -f1)
            
            # Get version from local node_modules
            VERSION=$(node -p "require('./node_modules/$BASE_NAME/package.json').version")
            echo "Detected $BASE_NAME version: $VERSION, downloading $PKG..."
            
            # Create target directory
            mkdir -p "node_modules/$PKG"
            
            # Download and extract from npm registry
            if [ "$BASE_NAME" = "esbuild" ]; then
              curl -sL "https://registry.npmjs.org/$PKG/-/linux-x64-$VERSION.tgz" | tar -xz -C "node_modules/$PKG" --strip-components=1
            else
              curl -sL "https://registry.npmjs.org/$PKG/-/rollup-linux-x64-gnu-$VERSION.tgz" | tar -xz -C "node_modules/$PKG" --strip-components=1
            fi
            
            if [ $? -eq 0 ]; then
              echo "✅ $PKG@$VERSION installed successfully"
            else
              echo "❌ Failed to install $PKG"
              exit 1
            fi
          done
      - run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
